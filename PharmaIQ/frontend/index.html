<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f6fbff;
            --surface: #ffffff;
            --ink: #0b1324;
            --muted: #52607a;
            --line: #dce6f4;
            --brand: #0f766e;
            --brand-soft: #ccfbf1;
            --warm: #ea580c;
            --danger: #be123c;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Manrope', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(900px 420px at 90% -10%, #b5f5ec 0%, rgba(181,245,236,0) 56%),
                radial-gradient(880px 440px at -8% 20%, #cfe7ff 0%, rgba(207,231,255,0) 54%),
                var(--bg);
        }

        .glass {
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid rgba(14, 165, 233, 0.18);
            backdrop-filter: blur(10px);
        }

        .scan-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent 0%, #2dd4bf 28%, #2dd4bf 72%, transparent 100%);
            box-shadow: 0 0 16px rgba(45, 212, 191, 0.8);
            animation: scanner 2.1s linear infinite;
        }

        @keyframes scanner {
            0% { top: 8%; }
            50% { top: 88%; }
            100% { top: 8%; }
        }

        .chat-drawer {
            transition: transform 260ms ease, opacity 260ms ease;
        }

        .fade-up {
            animation: fadeUp 380ms ease-out both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hover-lift {
            transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
        }

        .hover-lift:hover {
            transform: translateY(-4px);
        }

        .hover-zoom {
            transition: transform 360ms ease;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect, useMemo, useState } = React;

const API_BASE = "http://localhost:8000/api";
const ROUTINE_USER_ID = "demo-user";

const NAV_ITEMS = [
    { id: "finder", label: "Alternative Finder", icon: "fa-magnifying-glass-dollar" },
    { id: "shop", label: "Medicine Shop", icon: "fa-store" },
    { id: "routine", label: "My Daily Routine", icon: "fa-clock" },
    { id: "symptom", label: "Symptom Analyzer", icon: "fa-stethoscope" },
    { id: "interaction", label: "Interaction Checker", icon: "fa-shield-virus" },
    { id: "dosage", label: "Dosage Calculator", icon: "fa-calculator" },
    { id: "effects", label: "Side Effects", icon: "fa-triangle-exclamation" },
    { id: "encyclopedia", label: "Drug Encyclopedia", icon: "fa-book-medical" }
];

const CATEGORY_TAGS = ["All", "Pain Relief", "Diabetes", "Heart Care", "Supplements", "Devices"];
const CHAT_PROMPTS = [
    "What is the best dose for fever medicine?",
    "Check interaction between two medicines",
    "Suggest cheaper alternatives for Napa",
    "What side effects should I watch for?"
];

async function callApi(endpoint, data) {
    const res = await fetch(`${API_BASE}${endpoint}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });
    if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt || "Request failed");
    }
    return res.json();
}

function JsonView({ title, data }) {
    if (!data) return null;
    return (
        <div className="mt-4">
            <h3 className="font-bold text-slate-700 mb-2">{title}</h3>
            <pre className="bg-slate-900 text-slate-100 rounded-xl p-4 text-xs md:text-sm overflow-auto">
                {JSON.stringify(data, null, 2)}
            </pre>
        </div>
    );
}

function App() {
    const [view, setView] = useState("finder");
    const [mobileMenu, setMobileMenu] = useState(false);

    const initialRoutineReminders = [];

    const [query, setQuery] = useState("");
    const [isScanning, setIsScanning] = useState(false);
    const [isLoading, setIsLoading] = useState(false);
    const [results, setResults] = useState([]);

    const [chatOpen, setChatOpen] = useState(false);
    const [chatInput, setChatInput] = useState("");
    const [chatSending, setChatSending] = useState(false);
    const [chatCheckoutFlow, setChatCheckoutFlow] = useState({
        active: false,
        step: "",
        name: "",
        mobile: "",
        address: ""
    });
    const [chatMessages, setChatMessages] = useState([
        {
            sender: "bot",
            text: "Hello, I am PharmaBot. Ask me anything about medicines, side effects, dosage, interactions, or cheaper alternatives."
        }
    ]);

    const [profile, setProfile] = useState({
        name: "",
        allergies: [],
        reminders: initialRoutineReminders
    });

    const [shopProducts, setShopProducts] = useState([]);
    const [shopLoading, setShopLoading] = useState(true);
    const [shopSearch, setShopSearch] = useState("");
    const [shopCategory, setShopCategory] = useState("All");
    const [cart, setCart] = useState([]);
    const [checkoutForm, setCheckoutForm] = useState({ name: "", mobile: "", address: "" });
    const [checkoutError, setCheckoutError] = useState("");
    const [checkoutLoading, setCheckoutLoading] = useState(false);
    const [orderConfirmed, setOrderConfirmed] = useState(null);

    const [symptomForm, setSymptomForm] = useState({ symptoms: "", age: "", duration: "" });
    const [interactionInput, setInteractionInput] = useState("");
    const [dosageForm, setDosageForm] = useState({ medicine_name: "", age: "", weight: "", condition: "" });
    const [effectsForm, setEffectsForm] = useState({ medicine_name: "", patient_age: "", existing_conditions: "" });
    const [encyclopediaDrug, setEncyclopediaDrug] = useState("");

    const [moduleLoading, setModuleLoading] = useState("");
    const [moduleError, setModuleError] = useState("");
    const [symptomResult, setSymptomResult] = useState(null);
    const [interactionResult, setInteractionResult] = useState(null);
    const [dosageResult, setDosageResult] = useState(null);
    const [effectsResult, setEffectsResult] = useState(null);
    const [encyclopediaResult, setEncyclopediaResult] = useState(null);
    const [hasSearched, setHasSearched] = useState(false);

    useEffect(() => {
        const loadProducts = async () => {
            setShopLoading(true);
            try {
                const res = await fetch(`${API_BASE}/products`);
                const data = await res.json();
                const normalized = (Array.isArray(data) ? data : []).map((p, i) => ({
                    id: p.id || String(i + 1),
                    name: p.name || p.medicine_name || p.brand_name || p.generic_name || "Medicine",
                    brandName: p.brand_name || p.brand || p.medicine_name || p.name || "Unknown Brand",
                    genericName: p.generic_name || p.generic || "",
                    medicineName: p.medicine_name || p.medicineName || p.name || p.brand_name || "",
                    price: Number(p.price || 0),
                    brand: p.brand || p.brand_name || "Pharma Brand",
                    company: p.company || p.manufacturer || "",
                    drugClass: p.drug_class || p.class || "",
                    form: p.form || "",
                    strength: p.strength || "",
                    offer: p.offer || "",
                    packaging: Array.isArray(p.packaging) ? p.packaging : (p.packaging ? [String(p.packaging)] : []),
                    category: p.category || p.group || p.type || ["Pain Relief", "Diabetes", "Heart Care", "Supplements"][i % 4],
                    imageUrl: p.imageUrl || p.image_url || p.image || p.thumbnail || p.photo || "",
                    description: p.description || p.short_description || p.details || "",
                    stock: p.stock ?? p.quantity ?? null
                }));
                setShopProducts(normalized);
            } catch (e) {
                setShopProducts([]);
            } finally {
                setShopLoading(false);
            }
        };
        loadProducts();
    }, []);

    useEffect(() => {
        const loadRoutine = async () => {
            try {
                const res = await fetch(`${API_BASE}/user/${ROUTINE_USER_ID}`);
                if (!res.ok) return;

                const data = await res.json();
                const remoteRoutine = Array.isArray(data.routine) ? data.routine.map((item, index) => ({
                    id: item.id || item.routine_id || `${Date.now()}-${index}`,
                    dbId: item.id || item.routine_id || "",
                    time: item.time || "09:00 PM",
                    medicine: item.medicine || item.name || "Medicine",
                    status: item.status || "Pending"
                })) : [];

                if (remoteRoutine.length > 0) {
                    setProfile((prev) => ({ ...prev, reminders: remoteRoutine }));
                }
            } catch {
                // Keep local state when backend is unavailable.
            }
        };

        loadRoutine();
    }, []);

    const progress = useMemo(() => {
        const total = profile.reminders.length;
        const taken = profile.reminders.filter((item) => item.status === "Taken" || item.status === "Completed").length;
        return total ? Math.round((taken / total) * 100) : 0;
    }, [profile.reminders]);

    const filteredProducts = useMemo(() => {
        return shopProducts.filter((p) => {
            const matchCategory = shopCategory === "All" || p.category === shopCategory;
            const q = shopSearch.toLowerCase().trim();
            const matchSearch = !q ||
                p.name.toLowerCase().includes(q) ||
                p.brand.toLowerCase().includes(q) ||
                (p.brandName || "").toLowerCase().includes(q) ||
                (p.genericName || "").toLowerCase().includes(q) ||
                (p.company || "").toLowerCase().includes(q);
            return matchCategory && matchSearch;
        });
    }, [shopProducts, shopCategory, shopSearch]);

    const cartTotal = useMemo(() => cart.reduce((sum, item) => sum + item.price * item.qty, 0), [cart]);

    const getProductImage = (product) => {
        return product.imageUrl || product.image_url || product.image || product.thumbnail || product.photo || "";
    };

    const normalizeText = (value) => String(value || "").toLowerCase().trim();

    const preventEnterSubmit = (e) => {
        if (e.key === "Enter" && e.target.tagName !== "TEXTAREA") {
            e.preventDefault();
        }
    };

    const searchMedicines = (override) => {
        const text = (override || query).toLowerCase().trim();
        if (!text) {
            setHasSearched(false);
            setResults([]);
            return;
        }

        setHasSearched(true);
        setView("finder");
        setIsLoading(true);
        setResults([]);

        setTimeout(() => {
            if (shopProducts.length === 0) {
                setResults([]);
                setIsLoading(false);
                return;
            }

            const medicineFields = (p) => [
                p.name,
                p.medicineName,
                p.brandName,
                p.genericName,
                p.company,
                p.drugClass,
                p.category,
                p.form,
                p.strength,
                p.description
            ]
                .map(normalizeText)
                .filter(Boolean);

            const includesQuery = (p) => {
                return medicineFields(p).some((field) => field.includes(text));
            };

            const words = text.split(/\s+/).filter(Boolean);
            const matchesAnyWord = (p) => {
                return medicineFields(p).some((field) => words.some((word) => field.includes(word)));
            };

            const baseCandidates = shopProducts
                .filter((p) => includesQuery(p) || matchesAnyWord(p))
                .slice(0, 6);

            const finderRows = baseCandidates.map((base) => {
                const basePrice = Number(base.price || 0);
                const baseGeneric = normalizeText(base.genericName);

                const alternatives = shopProducts
                    .filter((p) => {
                        // Exclude the exact searched/base medicine from alternatives.
                        if (p.id === base.id) return false;

                        const genericName = normalizeText(p.genericName);
                        if (!baseGeneric || !genericName || genericName !== baseGeneric) return false;

                        const altPrice = Number(p.price || 0);
                        // Alternative list is generic-matched items sorted by low to high.
                        // Keep only valid priced items so ordering remains meaningful.
                        return altPrice > 0;
                    })
                    .sort((a, b) => Number(a.price || 0) - Number(b.price || 0))
                    .slice(0, 20);

                const cheapest = alternatives[0];
                const bestSaving = cheapest ? Math.max(basePrice - Number(cheapest.price || 0), 0) : 0;

                return {
                    base,
                    alternatives,
                    bestSaving
                };
            });

            setResults(finderRows);
            setIsLoading(false);
        }, 550);
    };

    const runScan = () => {
        setIsScanning(true);
        setTimeout(() => {
            setIsScanning(false);
            const fallback = shopProducts[0]?.name || "Paracetamol";
            setQuery(fallback);
            setHasSearched(true);
            searchMedicines(fallback);
        }, 2400);
    };

    const persistRoutineItem = async (item) => {
        const response = await fetch(`${API_BASE}/user/${ROUTINE_USER_ID}/routine`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(item)
        });

        if (!response.ok) {
            const text = await response.text();
            throw new Error(text || "Failed to save routine item");
        }

        return response.json();
    };

    const deleteRoutineItem = async (routineId) => {
        const response = await fetch(`${API_BASE}/user/${ROUTINE_USER_ID}/routine/${routineId}`, {
            method: "DELETE"
        });

        if (!response.ok) {
            const text = await response.text();
            throw new Error(text || "Failed to delete routine item");
        }

        return response.json();
    };

    const updateRoutineStatus = async (routineId, status) => {
        const response = await fetch(`${API_BASE}/user/${ROUTINE_USER_ID}/routine/${routineId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status })
        });

        if (!response.ok) {
            const text = await response.text();
            throw new Error(text || "Failed to update routine item");
        }

        return response.json();
    };

    const addToRoutine = async (medName) => {
        const next = {
            id: Date.now(),
            dbId: "",
            time: "09:00 PM",
            medicine: medName,
            status: "Pending"
        };
        setProfile((prev) => ({ ...prev, reminders: [...prev.reminders, next] }));
        setView("routine");

        try {
            const data = await persistRoutineItem(next);
            const savedId = data.id || data.routine_id || "";
            if (savedId) {
                setProfile((prev) => ({
                    ...prev,
                    reminders: prev.reminders.map((item) => item.id === next.id ? { ...item, dbId: savedId } : item)
                }));
            }
        } catch (err) {
            setModuleError(err.message || "Failed to save routine item.");
        }
    };

    const completeRoutineItem = async (id) => {
        const target = profile.reminders.find((item) => item.id === id);
        if (!target) return;

        setProfile((prev) => ({
            ...prev,
            reminders: prev.reminders.map((item) => item.id === id ? { ...item, status: "Taken" } : item)
        }));

        try {
            if (target.dbId) {
                await updateRoutineStatus(target.dbId, "Taken");
            }
        } catch (err) {
            setModuleError(err.message || "Failed to complete routine item.");
            setProfile((prev) => ({
                ...prev,
                reminders: prev.reminders.map((item) => item.id === id ? { ...item, status: target.status } : item)
            }));
        }
    };

    const removeRoutineItemFromList = async (id) => {
        const target = profile.reminders.find((item) => item.id === id);
        if (!target) return;

        setProfile((prev) => ({
            ...prev,
            reminders: prev.reminders.filter((item) => item.id !== id)
        }));

        try {
            if (target.dbId) {
                await deleteRoutineItem(target.dbId);
            }
        } catch (err) {
            setModuleError(err.message || "Failed to delete routine item.");
            setProfile((prev) => ({ ...prev, reminders: [...prev.reminders, target] }));
        }
    };

    const addToCart = (product) => {
        setCart((prev) => {
            const exist = prev.find((x) => x.id === product.id);
            if (exist) {
                return prev.map((x) => x.id === product.id ? { ...x, qty: x.qty + 1 } : x);
            }
            return [...prev, { ...product, qty: 1 }];
        });
    };

    const changeQty = (id, delta) => {
        setCart((prev) => prev
            .map((item) => item.id === id ? { ...item, qty: item.qty + delta } : item)
            .filter((item) => item.qty > 0)
        );
    };

    const buyFromFinder = (product) => {
        addToCart(product);
        setShopSearch(product.name || product.brandName || "");
        setView("shop");
    };

    const findBestProductMatch = (rawText) => {
        const normalizedSentence = normalizeText(rawText)
            .replace(/[^a-z0-9\s]/g, " ")
            .replace(/\s+/g, " ")
            .trim();

        const text = normalizedSentence
            .replace(/\b(add|to|cart|buy|please|medicine|medicines|now|this|that|korte|daw|dao|koro|hello|hi|i|want|need|am|ei|ta|ekta)\b/g, " ")
            .replace(/\s+/g, " ")
            .trim();

        if (!text) return null;

        const exact = shopProducts.find((p) => {
            const values = [p.name, p.brandName, p.genericName].map(normalizeText);
            return values.includes(text);
        });
        if (exact) return exact;

        const phraseHit = shopProducts.find((p) => {
            const values = [p.name, p.brandName, p.genericName]
                .map((value) => normalizeText(value).replace(/[^a-z0-9\s]/g, " ").replace(/\s+/g, " ").trim())
                .filter(Boolean);
            return values.some((value) => normalizedSentence.includes(value));
        });
        if (phraseHit) return phraseHit;

        const simpleContains = shopProducts.find((p) => {
            const hay = [p.name, p.brandName, p.genericName, p.company].map(normalizeText).join(" ");
            return hay.includes(text);
        });
        if (simpleContains) return simpleContains;

        const tokens = text.split(" ").filter((token) => token.length > 1);
        if (tokens.length === 0) return null;

        let bestMatch = null;
        let bestScore = 0;

        for (const product of shopProducts) {
            const productText = [product.name, product.brandName, product.genericName, product.company]
                .map((value) => normalizeText(value).replace(/[^a-z0-9\s]/g, " "))
                .join(" ");

            let score = 0;
            for (const token of tokens) {
                if (productText.includes(token)) score += 1;
            }

            if (score > bestScore) {
                bestScore = score;
                bestMatch = product;
            }
        }

        return bestScore > 0 ? bestMatch : null;
    };

    const findCheapestByGenericFromText = (rawText) => {
        const text = normalizeText(rawText);
        const genericPool = Array.from(new Set(shopProducts.map((p) => normalizeText(p.genericName)).filter(Boolean)));
        const matchedGeneric = genericPool.find((generic) => text.includes(generic));
        if (!matchedGeneric) return null;

        const sameGeneric = shopProducts
            .filter((p) => normalizeText(p.genericName) === matchedGeneric)
            .sort((a, b) => Number(a.price || 0) - Number(b.price || 0));

        if (sameGeneric.length === 0) return null;

        const cheapest = sameGeneric[0];
        const highest = sameGeneric[sameGeneric.length - 1];
        const savePerUnit = Math.max(Number(highest.price || 0) - Number(cheapest.price || 0), 0);

        return { generic: matchedGeneric, cheapest, savePerUnit };
    };

    const openCheckoutFlow = () => {
        setView("shop");
        setChatCheckoutFlow({ active: true, step: "name", name: "", mobile: "", address: "" });
        return "Great. Please share your full name to place the order.";
    };

    const submitCheckoutWithDetails = async (name, mobile, address) => {
        if (cart.length === 0) {
            setCheckoutError("Your cart is empty.");
            return { ok: false, message: "Your cart is empty. Please add a medicine first." };
        }

        const safeName = String(name || "").trim();
        const safeMobile = String(mobile || "").trim();
        const safeAddress = String(address || "").trim();

        if (!safeName || !safeMobile || !safeAddress) {
            return { ok: false, message: "Please provide name, phone number, and address." };
        }

        const mobileOk = /^\+?[0-9\-\s]{10,15}$/.test(safeMobile);
        if (!mobileOk) {
            return { ok: false, message: "Phone number seems invalid. Please enter a valid phone number." };
        }

        setCheckoutLoading(true);
        setCheckoutError("");

        try {
            const payload = {
                customer_name: safeName,
                mobile: safeMobile,
                address: safeAddress,
                total: cartTotal,
                items: cart.map((item) => ({
                    id: item.id,
                    name: item.name,
                    brand: item.brand || item.brandName || "",
                    qty: item.qty,
                    price: item.price
                }))
            };

            const response = await fetch(`${API_BASE}/orders`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                let errorMessage = "Checkout failed. Please try again.";
                try {
                    const errorData = await response.json();
                    if (errorData.detail) errorMessage = String(errorData.detail);
                } catch {
                    // Keep generic fallback.
                }
                throw new Error(errorMessage);
            }

            const data = await response.json();
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            setOrderConfirmed({
                orderId: data.order_id || `PH-${Date.now().toString().slice(-6)}`,
                name: safeName,
                mobile: safeMobile,
                address: safeAddress,
                items: totalItems,
                total: cartTotal
            });

            setCart([]);
            setCheckoutForm({ name: "", mobile: "", address: "" });
            return {
                ok: true,
                message: `Order placed successfully. Order ID: ${data.order_id || "Generated"}. Total: Tk ${cartTotal.toFixed(2)} for ${totalItems} item(s).`
            };
        } catch (err) {
            const message = err.message || "Checkout failed.";
            setCheckoutError(message);
            return { ok: false, message };
        } finally {
            setCheckoutLoading(false);
        }
    };

    const handleCheckout = async () => {
        const result = await submitCheckoutWithDetails(checkoutForm.name, checkoutForm.mobile, checkoutForm.address);
        if (!result.ok && !checkoutError) {
            setCheckoutError(result.message);
        }
    };

    const processPharmaBotAction = async (userText) => {
        const message = normalizeText(userText);

        if (chatCheckoutFlow.active) {
            if (chatCheckoutFlow.step === "name") {
                const name = userText.trim();
                if (!name) return { handled: true, reply: "Please provide your full name." };
                setCheckoutForm((prev) => ({ ...prev, name }));
                setChatCheckoutFlow((prev) => ({ ...prev, name, step: "mobile" }));
                return { handled: true, reply: "Thanks. Now send your phone number." };
            }

            if (chatCheckoutFlow.step === "mobile") {
                const mobile = userText.trim();
                const mobileOk = /^\+?[0-9\-\s]{10,15}$/.test(mobile);
                if (!mobileOk) return { handled: true, reply: "This phone number looks invalid. Please send a valid one." };
                setCheckoutForm((prev) => ({ ...prev, mobile }));
                setChatCheckoutFlow((prev) => ({ ...prev, mobile, step: "address" }));
                return { handled: true, reply: "Great. এবার delivery address দাও." };
            }

            if (chatCheckoutFlow.step === "address") {
                const address = userText.trim();
                if (!address) return { handled: true, reply: "Please send your full delivery address." };
                setCheckoutForm((prev) => ({ ...prev, address }));
                const flow = { ...chatCheckoutFlow, address };
                setChatCheckoutFlow({ active: false, step: "", name: "", mobile: "", address: "" });
                const result = await submitCheckoutWithDetails(flow.name, flow.mobile, address);
                return { handled: true, reply: result.message };
            }
        }

        const wantsAlternative = /alternative|kom dami|cheapest|lowest|low price|sasta/.test(message);
        const wantsAdd = /add|cart|add to cart/.test(message);
        const wantsBuy = /buy|kino|kinte|purchase|order/.test(message);

        if (wantsAlternative && (wantsAdd || wantsBuy)) {
            const alt = findCheapestByGenericFromText(userText);
            if (!alt) {
                return {
                    handled: true,
                    reply: "Which generic medicine do you want the cheaper alternative for? Example: Paracetamol, Omeprazole, Metformin."
                };
            }

            addToCart(alt.cheapest);
            setView("shop");
            const genericTitle = alt.cheapest.genericName || alt.generic;
            const saveLine = `I added ${alt.cheapest.brandName || alt.cheapest.name} (generic: ${genericTitle}) to cart. You save Tk ${alt.savePerUnit.toFixed(2)} per unit compared to the highest-priced option in this generic.`;

            if (wantsBuy) {
                const prompt = openCheckoutFlow();
                return { handled: true, reply: `${saveLine}\n\n${prompt}` };
            }
            return { handled: true, reply: saveLine };
        }

        if (wantsAdd || wantsBuy) {
            const product = findBestProductMatch(userText);
            if (!product) {
                return {
                    handled: true,
                    reply: "I could not identify the medicine. Please send the exact medicine or brand name."
                };
            }

            addToCart(product);
            setView("shop");
            setShopSearch(product.name || product.brandName || "");

            const addedLine = `${product.brandName || product.name} added to cart successfully.`;
            if (wantsBuy) {
                const prompt = openCheckoutFlow();
                return { handled: true, reply: `${addedLine}\n\n${prompt}` };
            }
            return { handled: true, reply: addedLine };
        }

        if (/checkout|place order|order now/.test(message)) {
            if (cart.length === 0) {
                return { handled: true, reply: "Your cart is empty. Add a medicine first." };
            }
            return { handled: true, reply: openCheckoutFlow() };
        }

        return { handled: false, reply: "" };
    };

    const sendMessage = async (messageText) => {
        const userText = messageText.trim();
        if (!userText || chatSending) return;

        setChatSending(true);
        const updated = [...chatMessages, { sender: "user", text: userText }];
        setChatMessages(updated);
        setChatInput("");

        try {
            const localAction = await processPharmaBotAction(userText);
            if (localAction.handled) {
                setChatMessages([...updated, { sender: "bot", text: localAction.reply }]);
                return;
            }

            const history = updated.map((m) => ({
                role: m.sender === "user" ? "user" : "assistant",
                content: m.text
            }));
            const data = await callApi("/chat", { message: userText, history });
            setChatMessages([...updated, { sender: "bot", text: data.response || "No response" }]);
        } catch (err) {
            setChatMessages([...updated, { sender: "bot", text: `Error: ${err.message}` }]);
        } finally {
            setChatSending(false);
        }
    };

                                    />
                                    <textarea
                                        value={checkoutForm.address}
                                        onChange={(e) => setCheckoutForm((prev) => ({ ...prev, address: e.target.value }))}
                                        placeholder="Delivery address"
                                        rows="2"
                                        className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
                                    ></textarea>
                                    {checkoutError && <p className="text-xs text-rose-600">{checkoutError}</p>}
                                </div>

                                <div className="flex justify-between font-extrabold text-lg">
                                    <span>Total</span><span>Tk {cartTotal.toFixed(2)}</span>
                                </div>
                                <button
                                    onClick={handleCheckout}
                                    disabled={checkoutLoading}
                                    className="w-full mt-4 h-11 rounded-xl bg-teal-700 text-white font-semibold"
                                >
                                    <i className="fa-solid fa-credit-card mr-2"></i>{checkoutLoading ? "Saving..." : "Checkout"}
                                </button>
                            </div>
                        </div>
                    )}

                    {orderConfirmed && (
                        <div className="mt-4 rounded-2xl border border-emerald-200 bg-emerald-50 p-4">
                            <div className="flex items-center mb-2">
                                <i className="fa-solid fa-circle-check text-emerald-600 mr-2"></i>
                                <p className="font-extrabold text-emerald-700">Order Confirmed</p>
                            </div>
                            <p className="text-sm text-emerald-800">Order ID: {orderConfirmed.orderId}</p>
                            <p className="text-sm text-emerald-800">Customer: {orderConfirmed.name}</p>
                            <p className="text-sm text-emerald-800">Mobile: {orderConfirmed.mobile}</p>
                            <p className="text-sm text-emerald-800">Address: {orderConfirmed.address}</p>
                            <p className="text-sm text-emerald-800">Items: {orderConfirmed.items}</p>
                            <p className="text-sm font-bold text-emerald-900">Total Paid: Tk {orderConfirmed.total.toFixed(2)}</p>
                        </div>
                    )}
                </div>
            </div>
        </section>
    );

    const RoutineView = () => (
        <section className="fade-up space-y-4">
            <div className="glass rounded-3xl p-6 md:p-8">
                <h2 className="text-2xl md:text-3xl font-extrabold mb-2">My Daily Pill Routine</h2>
                <p className="text-slate-600">Track your medicine intake and adherence progress.</p>
                <div className="mt-5">
                    <div className="flex justify-between text-sm mb-1">
                        <span className="text-slate-600">Today completion</span>
                        <span className="font-bold text-teal-700">{progress}%</span>
                    </div>
                    <div className="h-2.5 bg-slate-200 rounded-full overflow-hidden">
                        <div className="h-full bg-teal-600" style={{ width: `${progress}%` }}></div>
                    </div>
                </div>
            </div>

            {profile.reminders.length === 0 ? (
                <div className="glass rounded-xl p-5 text-slate-600">
                    No active medicines in your routine. Add a medicine from Finder or Shop.
                </div>
            ) : (
                profile.reminders.map((rem) => (
                    <div key={rem.id} className="glass rounded-xl p-4 flex items-center justify-between gap-3">
                        <div className="flex items-center min-w-0">
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center mr-3 ${rem.status === "Taken" || rem.status === "Completed" ? "bg-emerald-500 text-white" : "bg-slate-100 text-slate-500"}`}>
                                <i className={`fa-solid ${rem.status === "Taken" || rem.status === "Completed" ? "fa-check" : "fa-pills"}`}></i>
                            </div>
                            <div className="min-w-0">
                                <p className={`font-semibold truncate ${rem.status === "Taken" || rem.status === "Completed" ? "line-through text-slate-400" : "text-slate-800"}`}>{rem.medicine}</p>
                                <p className="text-xs text-teal-700">{rem.time}</p>
                            </div>
                        </div>

                        <div className="flex items-center gap-2 shrink-0">
                            {rem.status === "Taken" || rem.status === "Completed" ? (
                                <span className="text-xs px-3 py-1 rounded-full bg-emerald-100 text-emerald-700 font-semibold">Completed</span>
                            ) : (
                                <button onClick={() => completeRoutineItem(rem.id)} className="px-4 py-2 rounded-lg bg-teal-700 text-white text-sm font-semibold">
                                    Complete
                                </button>
                            )}
                            <button onClick={() => removeRoutineItemFromList(rem.id)} className="px-4 py-2 rounded-lg border border-rose-200 bg-rose-50 text-rose-700 text-sm font-semibold">
                                Delete
                            </button>
                        </div>
                    </div>
                ))
            )}
        </section>
    );

    const renderMain = () => {
        if (view === "finder") return FinderView();
        if (view === "shop") return ShopView();
        if (view === "routine") return RoutineView();

        if (view === "symptom") {
            return renderToolCard("Symptom Analyzer", "fa-stethoscope", (
                <>
                    <form onSubmit={submitSymptom} onKeyDown={preventEnterSubmit} className="space-y-3">
                        <textarea value={symptomForm.symptoms} onChange={(e) => setSymptomForm({ ...symptomForm, symptoms: e.target.value })} placeholder="Describe symptoms" className="w-full rounded-xl border border-slate-300 p-3" rows="4" required />
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <input value={symptomForm.age} onChange={(e) => setSymptomForm({ ...symptomForm, age: e.target.value })} type="number" placeholder="Age" className="rounded-xl border border-slate-300 p-3" />
                            <input value={symptomForm.duration} onChange={(e) => setSymptomForm({ ...symptomForm, duration: e.target.value })} placeholder="Duration (e.g., 2 days)" className="rounded-xl border border-slate-300 p-3" />
                        </div>
                        <button className="h-11 px-6 rounded-xl bg-teal-700 text-white font-semibold" type="submit">{moduleLoading === "symptom" ? "Analyzing..." : "Analyze Symptoms"}</button>
                    </form>
                    <JsonView title="Analysis" data={symptomResult} />
                </>
            ));
        }

        if (view === "interaction") {
            return renderToolCard("Drug Interaction Checker", "fa-shield-virus", (
                <>
                    <form onSubmit={submitInteraction} onKeyDown={preventEnterSubmit} className="space-y-3">
                        <textarea value={interactionInput} onChange={(e) => setInteractionInput(e.target.value)} placeholder="Medicines separated by comma" className="w-full rounded-xl border border-slate-300 p-3" rows="4" required />
                        <button className="h-11 px-6 rounded-xl bg-teal-700 text-white font-semibold" type="submit">{moduleLoading === "interaction" ? "Checking..." : "Check Interactions"}</button>
                    </form>
                    <JsonView title="Interaction Report" data={interactionResult} />
                </>
            ));
        }

        if (view === "dosage") {
            return renderToolCard("Dosage Calculator", "fa-calculator", (
                <>
                    <form onSubmit={submitDosage} onKeyDown={preventEnterSubmit} className="space-y-3">
                        <input value={dosageForm.medicine_name} onChange={(e) => setDosageForm({ ...dosageForm, medicine_name: e.target.value })} placeholder="Medicine name" className="w-full rounded-xl border border-slate-300 p-3" required />
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                            <input value={dosageForm.age} onChange={(e) => setDosageForm({ ...dosageForm, age: e.target.value })} type="number" placeholder="Age" className="rounded-xl border border-slate-300 p-3" required />
                            <input value={dosageForm.weight} onChange={(e) => setDosageForm({ ...dosageForm, weight: e.target.value })} type="number" step="0.1" placeholder="Weight (kg)" className="rounded-xl border border-slate-300 p-3" required />
                            <input value={dosageForm.condition} onChange={(e) => setDosageForm({ ...dosageForm, condition: e.target.value })} placeholder="Condition" className="rounded-xl border border-slate-300 p-3" />
                        </div>
                        <button className="h-11 px-6 rounded-xl bg-teal-700 text-white font-semibold" type="submit">{moduleLoading === "dosage" ? "Calculating..." : "Calculate Dosage"}</button>
                    </form>
                    <JsonView title="Dosage Recommendation" data={dosageResult} />
                </>
            ));
        }

        if (view === "effects") {
            return renderToolCard("Side Effects Predictor", "fa-triangle-exclamation", (
                <>
                    <form onSubmit={submitEffects} onKeyDown={preventEnterSubmit} className="space-y-3">
                        <input value={effectsForm.medicine_name} onChange={(e) => setEffectsForm({ ...effectsForm, medicine_name: e.target.value })} placeholder="Medicine name" className="w-full rounded-xl border border-slate-300 p-3" required />
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <input value={effectsForm.patient_age} onChange={(e) => setEffectsForm({ ...effectsForm, patient_age: e.target.value })} type="number" placeholder="Patient age" className="rounded-xl border border-slate-300 p-3" />
                            <input value={effectsForm.existing_conditions} onChange={(e) => setEffectsForm({ ...effectsForm, existing_conditions: e.target.value })} placeholder="Existing conditions" className="rounded-xl border border-slate-300 p-3" />
                        </div>
                        <button className="h-11 px-6 rounded-xl bg-teal-700 text-white font-semibold" type="submit">{moduleLoading === "effects" ? "Predicting..." : "Predict Side Effects"}</button>
                    </form>
                    <JsonView title="Side Effect Risk" data={effectsResult} />
                </>
            ));
        }

        return renderToolCard("Drug Encyclopedia", "fa-book-medical", (
            <>
                <form onSubmit={submitEncyclopedia} onKeyDown={preventEnterSubmit} className="space-y-3">
                    <input value={encyclopediaDrug} onChange={(e) => setEncyclopediaDrug(e.target.value)} placeholder="Search medicine info" className="w-full rounded-xl border border-slate-300 p-3" required />
                    <button className="h-11 px-6 rounded-xl bg-teal-700 text-white font-semibold" type="submit">{moduleLoading === "encyclopedia" ? "Loading..." : "Get Drug Info"}</button>
                </form>
                <JsonView title="Drug Profile" data={encyclopediaResult} />
            </>
        ));
    };

    const featureTips = {
        finder: [
            "Match the brand, generic name, strength, and form before choosing an alternative.",
            "If the search looks empty, try the exact brand name from the packet or prescription.",
            "Cheaper is good, but the same active ingredient matters more.",
        ],
        shop: [
            "Check packaging, strength, and company before adding a medicine to cart.",
            "Use the search box to narrow by brand, generic name, or manufacturer.",
            "Compare similar products before buying the first one you see.",
        ],
        routine: [
            "Take routine medicines at the same time every day to avoid missed doses.",
            "Complete removes a medicine from the database and keeps the active list clean.",
            "Use Delete if you no longer need a reminder.",
        ],
        symptom: [
            "List symptoms clearly with duration and age for a better result.",
            "Go to urgent care if symptoms are severe or suddenly worsening.",
            "Use the result as guidance, not a final diagnosis.",
        ],
        interaction: [
            "Enter all medicines you take, including over-the-counter products.",
            "Double-check interactions before combining two new medicines.",
            "Ask a pharmacist if the interaction result looks serious.",
        ],
        dosage: [
            "Enter age and weight accurately for a safer dose estimate.",
            "Do not use the calculator for emergency treatment decisions.",
            "If the medicine has special instructions, follow the label or your doctor.",
        ],
        effects: [
            "Watch for common side effects after starting a new medicine.",
            "Severe rash, swelling, or breathing trouble needs immediate care.",
            "Report ongoing side effects to a clinician or pharmacist.",
        ],
        encyclopedia: [
            "Use the encyclopedia to understand what a medicine does before starting it.",
            "Check storage and contraindications if the medicine is for regular use.",
            "Cross-check with a licensed clinician when a medicine is new to you.",
        ],
        default: [
            "Keep medicines away from children and direct heat.",
            "Do not combine medicines without checking interactions first.",
            "If symptoms are severe, seek medical care first.",
        ]
    };

    const TipsPanel = () => {
        const currentTips = featureTips[view] || featureTips.default;
        const title = NAV_ITEMS.find((item) => item.id === view)?.label || "Health Tips";

        return (
            <aside className="glass rounded-2xl p-5 sticky top-24">
            <h3 className="text-lg font-bold mb-3 flex items-center">
                <i className="fa-solid fa-lightbulb text-amber-500 mr-2"></i>
                {title} Tips
            </h3>
            <ul className="space-y-3 text-sm text-slate-700">
                {currentTips.map((tip) => (
                    <li key={tip} className="flex"><i className="fa-solid fa-check text-teal-600 mt-1 mr-2"></i>{tip}</li>
                ))}
            </ul>
        </aside>
        );
    };

    return (
        <div className="min-h-screen flex">
            <aside className="hidden md:flex w-72 flex-col border-r border-slate-200 bg-white/90 backdrop-blur px-5 py-6 sticky top-0 h-screen">
                <button className="flex items-center mb-8" onClick={() => setView("finder")}>
                    <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-teal-600 to-cyan-500 text-white flex items-center justify-center mr-3 shadow-lg shadow-teal-200">
                        <i className="fa-solid fa-pills text-lg"></i>
                    </div>
                    <div className="text-left">
                        <p className="font-extrabold text-lg leading-none tracking-tight">PharmaIQ</p>
                        <p className="text-xs text-slate-500">Medicine. Advice. Shopping.</p>
                    </div>
                </button>

                <nav className="space-y-2 overflow-auto pr-1">
                    {NAV_ITEMS.map((item) => (
                        <button
                            key={item.id}
                            onClick={() => setView(item.id)}
                            className={`w-full h-11 rounded-lg text-left px-3 text-sm font-semibold transition ${view === item.id ? "bg-teal-700 text-white" : "bg-slate-100 text-slate-700 hover:bg-slate-200"}`}
                        >
                            <i className={`fa-solid ${item.icon} mr-2`}></i>{item.label}
                        </button>
                    ))}
                </nav>

                <div className="mt-auto rounded-xl bg-amber-50 border border-amber-100 p-3 text-xs text-amber-800">
                    For informational support only. Consult licensed doctors for final decisions.
                </div>
            </aside>

            <div className="flex-1 min-w-0">
                <header className="md:hidden sticky top-0 z-30 bg-white/90 backdrop-blur border-b border-slate-200 px-4 py-3 flex items-center justify-between">
                    <div className="flex items-center">
                        <div className="w-10 h-10 rounded-2xl bg-gradient-to-br from-teal-600 to-cyan-500 text-white flex items-center justify-center mr-2 shadow-lg shadow-teal-100">
                            <i className="fa-solid fa-pills"></i>
                        </div>
                        <div>
                            <p className="font-extrabold leading-none">PharmaIQ</p>
                            <p className="text-[11px] text-slate-500">Medicine Platform</p>
                        </div>
                    </div>
                    <button onClick={() => setMobileMenu(true)} className="w-10 h-10 rounded-lg bg-slate-100 text-slate-700">
                        <i className="fa-solid fa-bars"></i>
                    </button>
                </header>

                <main className="max-w-7xl mx-auto px-4 md:px-6 py-6 grid grid-cols-1 xl:grid-cols-12 gap-6">
                    <div className={`${view === "shop" ? "xl:col-span-12" : "xl:col-span-8"} space-y-4`}>
                        {moduleError && <div className="glass rounded-xl p-3 text-sm text-rose-700 bg-rose-50 border-rose-200">{moduleError}</div>}
                        {renderMain()}
                    </div>
                    <div className={`xl:col-span-4 hidden xl:block ${view === "shop" ? "xl:hidden" : ""}`}>
                        <TipsPanel />
                    </div>
                </main>
            </div>

            {mobileMenu && (
                <div className="fixed inset-0 bg-black/40 z-50 md:hidden" onClick={() => setMobileMenu(false)}>
                    <div className="w-80 max-w-[90vw] h-full bg-white p-4" onClick={(e) => e.stopPropagation()}>
                        <div className="flex items-center mb-4">
                            <div className="w-10 h-10 rounded-2xl bg-gradient-to-br from-teal-600 to-cyan-500 text-white flex items-center justify-center mr-3">
                                <i className="fa-solid fa-pills"></i>
                            </div>
                            <div>
                                <p className="font-extrabold leading-none">PharmaIQ</p>
                                <p className="text-[11px] text-slate-500">Medicine Platform</p>
                            </div>
                        </div>
                        <div className="space-y-2 overflow-auto">
                            {NAV_ITEMS.map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => { setView(item.id); setMobileMenu(false); }}
                                    className={`w-full h-11 rounded-lg text-left px-3 text-sm font-semibold ${view === item.id ? "bg-teal-700 text-white" : "bg-slate-100 text-slate-700"}`}
                                >
                                    <i className={`fa-solid ${item.icon} mr-2`}></i>{item.label}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            )}

            {isScanning && (
                <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center px-4">
                    <div className="relative w-72 h-96 rounded-xl border border-teal-400 overflow-hidden mb-5">
                        <img src="https://images.unsplash.com/photo-1586281380349-632531db7ed4?auto=format&fit=crop&w=500&q=80" alt="Prescription" className="w-full h-full object-cover opacity-55" />
                        <div className="scan-line"></div>
                    </div>
                    <h3 className="text-white text-xl font-bold">AI OCR is scanning prescription...</h3>
                </div>
            )}

            <div className="fixed right-5 bottom-5 z-40">
                <button onClick={() => setChatOpen((v) => !v)} className="w-14 h-14 rounded-full bg-teal-700 text-white shadow-xl hover:bg-teal-800">
                    <i className={`fa-solid ${chatOpen ? "fa-xmark" : "fa-comment-medical"} text-xl`}></i>
                </button>
            </div>

            <aside className={`chat-drawer fixed right-4 bottom-4 top-4 w-[min(92vw,420px)] rounded-3xl overflow-hidden bg-white border border-slate-200 shadow-[0_24px_80px_rgba(15,23,42,0.18)] z-50 ${chatOpen ? "translate-x-0 opacity-100" : "translate-x-full opacity-0 pointer-events-none"}`}>
                <div className="h-full flex flex-col bg-gradient-to-b from-white via-cyan-50 to-slate-50">
                    <div className="px-4 py-3 border-b border-slate-200 flex items-center justify-between bg-gradient-to-r from-teal-700 via-cyan-600 to-teal-500 text-white">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-2xl bg-white/20 flex items-center justify-center border border-white/20">
                                <i className="fa-solid fa-robot text-lg"></i>
                            </div>
                            <div>
                                <h4 className="font-extrabold text-white leading-none text-[15px]">PharmaBot</h4>
                                <p className="text-[10px] text-white/80 mt-1">Gemini-powered medicine assistant</p>
                            </div>
                        </div>
                        <button onClick={() => setChatOpen(false)} className="w-8 h-8 rounded-full bg-white/15 text-white border border-white/20"><i className="fa-solid fa-xmark text-sm"></i></button>
                    </div>

                    <div className="px-4 py-2.5 border-b border-cyan-100 bg-white/80 backdrop-blur-sm">
                        <div className="flex items-center justify-between text-[10px] text-slate-500 mb-2">
                            <span>Quick questions</span>
                            <span className="inline-flex items-center gap-1 text-emerald-700 font-semibold"><i className="fa-solid fa-sparkles"></i> Smart reply</span>
                        </div>
                        <div className="flex flex-wrap gap-1.5">
                            {CHAT_PROMPTS.map((prompt) => (
                                <button
                                    key={prompt}
                                    type="button"
                                    onClick={() => useQuickPrompt(prompt)}
                                    className="text-left px-3 py-1.5 rounded-full bg-cyan-50 hover:bg-cyan-100 border border-cyan-200 text-[10px] text-cyan-900 transition"
                                >
                                    {prompt}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-3 space-y-2.5">
                        {chatMessages.map((m, i) => (
                            <div key={i} className={`flex ${m.sender === "user" ? "justify-end" : "justify-start"} fade-up`}>
                                <div className={`max-w-[84%] flex items-end gap-2 ${m.sender === "user" ? "flex-row-reverse" : ""}`}>
                                    <div className={`w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold ${m.sender === "user" ? "bg-teal-700 text-white" : "bg-white border border-cyan-200 text-cyan-700"}`}>
                                        {m.sender === "user" ? "You" : "AI"}
                                    </div>
                                    <div className={`px-3.5 py-2.5 rounded-2xl text-[13px] shadow-sm ${m.sender === "user" ? "bg-gradient-to-r from-teal-700 to-cyan-600 text-white rounded-br-md" : "bg-white border border-slate-200 text-slate-800 rounded-bl-md"}`}>
                                        {m.text}
                                    </div>
                                </div>
                            </div>
                        ))}

                        {chatSending && (
                            <div className="flex justify-start fade-up">
                                <div className="max-w-[84%] flex items-end gap-2">
                                    <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold bg-white border border-cyan-200 text-cyan-700">AI</div>
                                    <div className="px-4 py-3 rounded-2xl text-sm bg-white border border-slate-200 text-slate-500 rounded-bl-md shadow-sm">
                                        <span className="inline-flex items-center gap-1">
                                            <span className="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></span>
                                            <span className="w-2 h-2 rounded-full bg-cyan-500 animate-pulse" style={{ animationDelay: "120ms" }}></span>
                                            <span className="w-2 h-2 rounded-full bg-cyan-500 animate-pulse" style={{ animationDelay: "240ms" }}></span>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <form onSubmit={sendChat} className="p-3 border-t border-slate-200 flex gap-2 bg-white/90 backdrop-blur-sm">
                        <input value={chatInput} onChange={(e) => setChatInput(e.target.value)} placeholder="Ask about medicine, dosage, side effects..." className="flex-1 h-11 rounded-2xl border border-slate-300 px-4 text-[13px] focus:outline-none focus:ring-2 focus:ring-teal-500" />
                        <button className="w-11 h-11 rounded-2xl bg-gradient-to-r from-teal-700 to-cyan-600 text-white shadow-sm transition-all duration-200 hover:scale-105 active:scale-95" type="submit" disabled={chatSending}>
                            <i className="fa-solid fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </aside>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
