<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f6fbff;
            --surface: #ffffff;
            --ink: #0b1324;
            --muted: #52607a;
            --line: #dce6f4;
            --brand: #0f766e;
            --brand-soft: #ccfbf1;
            --warm: #ea580c;
            --danger: #be123c;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Manrope', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(900px 420px at 90% -10%, #b5f5ec 0%, rgba(181,245,236,0) 56%),
                radial-gradient(880px 440px at -8% 20%, #cfe7ff 0%, rgba(207,231,255,0) 54%),
                var(--bg);
        }

        .glass {
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid rgba(14, 165, 233, 0.18);
            backdrop-filter: blur(10px);
        }

        .scan-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent 0%, #2dd4bf 28%, #2dd4bf 72%, transparent 100%);
            box-shadow: 0 0 16px rgba(45, 212, 191, 0.8);
            animation: scanner 2.1s linear infinite;
        }

        @keyframes scanner {
            0% { top: 8%; }
            50% { top: 88%; }
            100% { top: 8%; }
        }

        .chat-drawer {
            transition: transform 260ms ease, opacity 260ms ease;
        }

        .fade-up {
            animation: fadeUp 380ms ease-out both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect, useMemo, useState } = React;

const API_BASE = "http://localhost:8000/api";

const NAV_ITEMS = [
    { id: "finder", label: "Alternative Finder", icon: "fa-magnifying-glass-dollar" },
    { id: "shop", label: "Medicine Shop", icon: "fa-store" },
    { id: "routine", label: "My Daily Routine", icon: "fa-clock" },
    { id: "symptom", label: "Symptom Analyzer", icon: "fa-stethoscope" },
    { id: "interaction", label: "Interaction Checker", icon: "fa-shield-virus" },
    { id: "dosage", label: "Dosage Calculator", icon: "fa-calculator" },
    { id: "effects", label: "Side Effects", icon: "fa-triangle-exclamation" },
    { id: "encyclopedia", label: "Drug Encyclopedia", icon: "fa-book-medical" }
];

const MOCK_DB = {
    napa: {
        brand: "Napa 500mg",
        generic: "Paracetamol",
        company: "Beximco",
        price: 1.2,
        medClass: "Analgesic",
        alternatives: [
            { brand: "Ace", price: 0.8, company: "Square" },
            { brand: "Reset", price: 0.85, company: "Incepta" }
        ]
    },
    seclo: {
        brand: "Seclo 20mg",
        generic: "Omeprazole",
        company: "Square",
        price: 6,
        medClass: "Antacid",
        alternatives: [
            { brand: "Losectil", price: 4.5, company: "Eskayef" },
            { brand: "Progut", price: 5, company: "Renata" }
        ]
    },
    comet: {
        brand: "Comet 500mg",
        generic: "Metformin",
        company: "Square",
        price: 4,
        medClass: "Anti-diabetic",
        alternatives: [
            { brand: "Metfo", price: 2.5, company: "Beximco" },
            { brand: "Informin", price: 3, company: "Acme" }
        ]
    }
};

const DIET_TIPS = {
    Analgesic: "Take after food and keep hydration high to reduce gastric discomfort.",
    Antacid: "Avoid spicy, greasy, and acidic meals. Prefer small, frequent meals.",
    "Anti-diabetic": "Prioritize high-fiber food, avoid refined sugar, and track glucose regularly."
};

const CATEGORY_TAGS = ["All", "Pain Relief", "Diabetes", "Heart Care", "Supplements", "Devices"];

async function callApi(endpoint, data) {
    const res = await fetch(`${API_BASE}${endpoint}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });
    if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt || "Request failed");
    }
    return res.json();
}

function JsonView({ title, data }) {
    if (!data) return null;
    return (
        <div className="mt-4">
            <h3 className="font-bold text-slate-700 mb-2">{title}</h3>
            <pre className="bg-slate-900 text-slate-100 rounded-xl p-4 text-xs md:text-sm overflow-auto">
                {JSON.stringify(data, null, 2)}
            </pre>
        </div>
    );
}

function App() {
    const [view, setView] = useState("finder");
    const [mobileMenu, setMobileMenu] = useState(false);

    const [query, setQuery] = useState("");
    const [isScanning, setIsScanning] = useState(false);
    const [isLoading, setIsLoading] = useState(false);
    const [results, setResults] = useState([]);

    const [chatOpen, setChatOpen] = useState(false);
    const [chatInput, setChatInput] = useState("");
    const [chatMessages, setChatMessages] = useState([
        { sender: "bot", text: "Hello, I am PharmaBot. Ask me anything about medicines." }
    ]);

    const [profile, setProfile] = useState({
        name: "Rashed",
        allergies: ["Paracetamol"],
        reminders: [
            { id: 1, time: "08:00 AM", medicine: "Seclo 20mg", status: "Taken" },
            { id: 2, time: "08:00 PM", medicine: "Comet 500mg", status: "Pending" }
        ]
    });

    const [shopProducts, setShopProducts] = useState([]);
    const [shopLoading, setShopLoading] = useState(true);
    const [shopSearch, setShopSearch] = useState("");
    const [shopCategory, setShopCategory] = useState("All");
    const [cart, setCart] = useState([]);

    const [symptomForm, setSymptomForm] = useState({ symptoms: "", age: "", duration: "" });
    const [interactionInput, setInteractionInput] = useState("");
    const [dosageForm, setDosageForm] = useState({ medicine_name: "", age: "", weight: "", condition: "" });
    const [effectsForm, setEffectsForm] = useState({ medicine_name: "", patient_age: "", existing_conditions: "" });
    const [encyclopediaDrug, setEncyclopediaDrug] = useState("");

    const [moduleLoading, setModuleLoading] = useState("");
    const [moduleError, setModuleError] = useState("");
    const [symptomResult, setSymptomResult] = useState(null);
    const [interactionResult, setInteractionResult] = useState(null);
    const [dosageResult, setDosageResult] = useState(null);
    const [effectsResult, setEffectsResult] = useState(null);
    const [encyclopediaResult, setEncyclopediaResult] = useState(null);

    useEffect(() => {
        const loadProducts = async () => {
            setShopLoading(true);
            try {
                const res = await fetch(`${API_BASE}/products`);
                const data = await res.json();
                const normalized = (Array.isArray(data) ? data : []).map((p, i) => ({
                    id: p.id || String(i + 1),
                    name: p.name || p.brand_name || p.generic_name || "Medicine",
                    brandName: p.brand_name || p.name || "Unknown Brand",
                    genericName: p.generic_name || "",
                    price: Number(p.price || 0),
                    brand: p.brand || p.brand_name || "Pharma Brand",
                    company: p.company || p.manufacturer || "",
                    drugClass: p.drug_class || p.class || "",
                    form: p.form || "",
                    strength: p.strength || "",
                    offer: p.offer || "",
                    packaging: Array.isArray(p.packaging) ? p.packaging : (p.packaging ? [String(p.packaging)] : []),
                    category: p.category || p.group || p.type || ["Pain Relief", "Diabetes", "Heart Care", "Supplements"][i % 4],
                    imageUrl: p.imageUrl || p.image_url || p.image || p.thumbnail || p.photo || "",
                    description: p.description || p.short_description || p.details || "",
                    stock: p.stock ?? p.quantity ?? null
                }));
                setShopProducts(normalized);
            } catch (e) {
                setShopProducts([]);
            } finally {
                setShopLoading(false);
            }
        };
        loadProducts();
    }, []);

    const progress = useMemo(() => {
        const total = profile.reminders.length;
        const taken = profile.reminders.filter((r) => r.status === "Taken").length;
        return total ? Math.round((taken / total) * 100) : 0;
    }, [profile.reminders]);

    const filteredProducts = useMemo(() => {
        return shopProducts.filter((p) => {
            const matchCategory = shopCategory === "All" || p.category === shopCategory;
            const q = shopSearch.toLowerCase().trim();
            const matchSearch = !q ||
                p.name.toLowerCase().includes(q) ||
                p.brand.toLowerCase().includes(q) ||
                (p.brandName || "").toLowerCase().includes(q) ||
                (p.genericName || "").toLowerCase().includes(q) ||
                (p.company || "").toLowerCase().includes(q);
            return matchCategory && matchSearch;
        });
    }, [shopProducts, shopCategory, shopSearch]);

    const cartTotal = useMemo(() => cart.reduce((sum, item) => sum + item.price * item.qty, 0), [cart]);

    const getProductImage = (product) => {
        return product.imageUrl || product.image_url || product.image || product.thumbnail || product.photo || "";
    };

    const searchMedicines = (override) => {
        const text = (override || query).toLowerCase().trim();
        if (!text) return;
        setView("finder");
        setIsLoading(true);

        setTimeout(() => {
            const matches = Object.keys(MOCK_DB)
                .filter((k) => text.includes(k))
                .map((k) => MOCK_DB[k]);
            setResults(matches);
            setIsLoading(false);
        }, 850);
    };

    const runScan = () => {
        setIsScanning(true);
        setTimeout(() => {
            setIsScanning(false);
            setQuery("Napa and Comet");
            searchMedicines("napa comet");
        }, 2400);
    };

    const addToRoutine = (medName) => {
        const next = {
            id: Date.now(),
            time: "09:00 PM",
            medicine: medName,
            status: "Pending"
        };
        setProfile((prev) => ({ ...prev, reminders: [...prev.reminders, next] }));
        setView("routine");
    };

    const markTaken = (id) => {
        setProfile((prev) => ({
            ...prev,
            reminders: prev.reminders.map((r) => r.id === id ? { ...r, status: "Taken" } : r)
        }));
    };

    const addToCart = (product) => {
        setCart((prev) => {
            const exist = prev.find((x) => x.id === product.id);
            if (exist) {
                return prev.map((x) => x.id === product.id ? { ...x, qty: x.qty + 1 } : x);
            }
            return [...prev, { ...product, qty: 1 }];
        });
    };

    const changeQty = (id, delta) => {
        setCart((prev) => prev
            .map((item) => item.id === id ? { ...item, qty: item.qty + delta } : item)
            .filter((item) => item.qty > 0)
        );
    };

    const sendChat = async (e) => {
        e.preventDefault();
        if (!chatInput.trim()) return;
        const userText = chatInput.trim();
        const updated = [...chatMessages, { sender: "user", text: userText }];
        setChatMessages(updated);
        setChatInput("");

        try {
            const history = updated.map((m) => ({
                role: m.sender === "user" ? "user" : "assistant",
                content: m.text
            }));
            const data = await callApi("/chat", { message: userText, history });
            setChatMessages([...updated, { sender: "bot", text: data.response || "No response" }]);
        } catch (err) {
            setChatMessages([...updated, { sender: "bot", text: `Error: ${err.message}` }]);
        }
    };

    const submitSymptom = async (e) => {
        e.preventDefault();
        setModuleError("");
        setModuleLoading("symptom");
        setSymptomResult(null);
        try {
            const data = await callApi("/symptoms", {
                symptoms: symptomForm.symptoms,
                age: symptomForm.age ? Number(symptomForm.age) : null,
                duration: symptomForm.duration
            });
            setSymptomResult(data);
        } catch (err) {
            setModuleError(err.message);
        } finally {
            setModuleLoading("");
        }
    };

    const submitInteraction = async (e) => {
        e.preventDefault();
        setModuleError("");
        setModuleLoading("interaction");
        setInteractionResult(null);
        try {
            const medicines = interactionInput.split(",").map((m) => m.trim()).filter(Boolean);
            const data = await callApi("/interactions", { medicines });
            setInteractionResult(data);
        } catch (err) {
            setModuleError(err.message);
        } finally {
            setModuleLoading("");
        }
    };

    const submitDosage = async (e) => {
        e.preventDefault();
        setModuleError("");
        setModuleLoading("dosage");
        setDosageResult(null);
        try {
            const data = await callApi("/dosage", {
                medicine_name: dosageForm.medicine_name,
                age: Number(dosageForm.age),
                weight: Number(dosageForm.weight),
                condition: dosageForm.condition
            });
            setDosageResult(data);
        } catch (err) {
            setModuleError(err.message);
        } finally {
            setModuleLoading("");
        }
    };

    const submitEffects = async (e) => {
        e.preventDefault();
        setModuleError("");
        setModuleLoading("effects");
        setEffectsResult(null);
        try {
            const data = await callApi("/side-effects", {
                medicine_name: effectsForm.medicine_name,
                patient_age: effectsForm.patient_age ? Number(effectsForm.patient_age) : null,
                existing_conditions: effectsForm.existing_conditions
                    .split(",")
                    .map((item) => item.trim())
                    .filter(Boolean)
            });
            setEffectsResult(data);
        } catch (err) {
            setModuleError(err.message);
        } finally {
            setModuleLoading("");
        }
    };

    const submitEncyclopedia = async (e) => {
        e.preventDefault();
        setModuleError("");
        setModuleLoading("encyclopedia");
        setEncyclopediaResult(null);
        try {
            const data = await callApi("/medicine-info", { medicine_name: encyclopediaDrug });
            setEncyclopediaResult(data);
        } catch (err) {
            setModuleError(err.message);
        } finally {
            setModuleLoading("");
        }
    };

    const ToolCard = ({ title, icon, children }) => (
        <section className="glass rounded-2xl p-6 fade-up">
            <h2 className="text-2xl font-extrabold mb-4 flex items-center">
                <i className={`fa-solid ${icon} text-teal-700 mr-3`}></i>{title}
            </h2>
            {children}
        </section>
    );

    const FinderView = () => (
        <section className="fade-up space-y-6">
            <div className="glass rounded-3xl p-6 md:p-8">
                <h2 className="text-3xl md:text-5xl font-extrabold tracking-tight text-slate-900 mb-4">
                    Find Better Medicine Alternatives
                </h2>
                <p className="text-slate-600 max-w-2xl">
                    Search brand names or scan a prescription to find cheaper alternatives instantly.
                </p>

                <div className="mt-7 bg-white rounded-2xl border border-slate-200 p-3 md:p-4 shadow-sm">
                    <div className="flex flex-col md:flex-row gap-3">
                        <div className="relative flex-1">
                            <i className="fa-solid fa-magnifying-glass absolute left-4 top-4 text-slate-400"></i>
                            <input
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                onKeyDown={(e) => e.key === "Enter" && searchMedicines()}
                                placeholder="e.g. Napa 500mg, Seclo 20mg"
                                className="w-full h-12 rounded-xl border border-slate-200 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-teal-500"
                            />
                        </div>
                        <button onClick={runScan} className="h-12 px-5 rounded-xl border border-teal-200 bg-teal-50 text-teal-700 font-semibold hover:bg-teal-100">
                            <i className="fa-solid fa-camera mr-2"></i>Scan Image
                        </button>
                        <button onClick={() => searchMedicines()} className="h-12 px-7 rounded-xl bg-teal-700 text-white font-semibold hover:bg-teal-800">
                            Search
                        </button>
                    </div>
                </div>
            </div>

            {isLoading && (
                <div className="glass rounded-2xl p-8 text-center">
                    <div className="w-12 h-12 border-4 border-teal-100 border-t-teal-700 rounded-full animate-spin mx-auto"></div>
                    <p className="mt-3 text-slate-600">Analyzing prescription...</p>
                </div>
            )}

            {!isLoading && results.length > 0 && (
                <div className="space-y-6">
                    {results.map((med, idx) => {
                        const minPrice = Math.min(...med.alternatives.map((a) => a.price));
                        const saving = (med.price - minPrice).toFixed(2);
                        const allergy = profile.allergies.includes(med.generic);

                        return (
                            <article key={idx} className="glass rounded-2xl overflow-hidden fade-up">
                                {allergy && (
                                    <div className="bg-rose-50 border-b border-rose-200 px-5 py-4 text-rose-700 text-sm">
                                        <i className="fa-solid fa-triangle-exclamation mr-2"></i>
                                        Allergy warning: {med.generic} is in your profile.
                                    </div>
                                )}

                                <div className="p-6 md:p-7 border-b border-slate-100 flex flex-col md:flex-row md:items-start md:justify-between gap-5">
                                    <div>
                                        <span className="text-xs font-bold uppercase tracking-wide px-2.5 py-1 rounded-full bg-slate-100 text-slate-600">{med.medClass}</span>
                                        <h3 className="text-2xl font-extrabold mt-2">{med.brand}</h3>
                                        <p className="text-slate-600 mt-1">Generic: {med.generic}</p>
                                        <p className="text-slate-500 text-sm">Company: {med.company}</p>
                                    </div>

                                    <div className="md:text-right">
                                        <p className="text-3xl font-extrabold text-slate-900">Tk {med.price.toFixed(2)}</p>
                                        <p className="text-xs text-slate-500">per tablet</p>
                                        <div className="mt-3 flex md:justify-end gap-2">
                                            <button onClick={() => addToRoutine(med.brand)} className="px-4 py-2 rounded-lg border border-teal-200 bg-teal-50 text-teal-700 text-sm font-semibold">
                                                <i className="fa-regular fa-clock mr-1"></i>Add to Routine
                                            </button>
                                            <button onClick={() => setView("shop")} className="px-4 py-2 rounded-lg bg-slate-900 text-white text-sm font-semibold">
                                                <i className="fa-solid fa-store mr-1"></i>Buy from Shop
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div className="px-6 md:px-7 py-3 bg-teal-700 text-white text-sm font-semibold">
                                    Save up to Tk {saving} per tablet by switching alternatives.
                                </div>

                                <div className="p-6 md:p-7 bg-slate-50">
                                    <h4 className="font-bold text-slate-700 mb-4">Cheaper Alternatives</h4>
                                    <div className="grid sm:grid-cols-2 gap-3">
                                        {med.alternatives.map((alt, i) => (
                                            <div key={i} className="bg-white rounded-xl border border-slate-200 p-4">
                                                <div className="flex items-start justify-between">
                                                    <div>
                                                        <p className="font-bold text-slate-800">{alt.brand}</p>
                                                        <p className="text-xs text-slate-500">{alt.company}</p>
                                                    </div>
                                                    <p className="font-extrabold text-teal-700">Tk {alt.price.toFixed(2)}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="px-6 md:px-7 py-4 bg-cyan-50 border-t border-cyan-100 text-cyan-900 text-sm">
                                    <i className="fa-solid fa-apple-whole mr-2"></i>
                                    {DIET_TIPS[med.medClass]}
                                </div>
                            </article>
                        );
                    })}
                </div>
            )}

            {!isLoading && query && results.length === 0 && (
                <div className="glass rounded-2xl p-8 text-center text-slate-600">
                    <i className="fa-regular fa-face-frown text-4xl mb-3 text-slate-300"></i>
                    <p>No medicine matched your search.</p>
                </div>
            )}
        </section>
    );

    const ShopView = () => (
        <section className="fade-up grid grid-cols-1 xl:grid-cols-12 gap-6">
            <div className="xl:col-span-8 space-y-4">
                <div className="glass rounded-2xl p-5">
                    <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-5">
                        <div>
                            <p className="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-teal-50 text-teal-700 mb-2">
                                <i className="fa-solid fa-store mr-2"></i>Medicine Shop
                            </p>
                            <h2 className="text-2xl md:text-3xl font-extrabold">E-Medicine Shop</h2>
                            <p className="text-slate-600 mt-1">Browse verified medicines and wellness products, add to cart, and checkout.</p>
                        </div>
                        <div className="grid grid-cols-3 gap-3 text-center">
                            <div className="rounded-xl bg-slate-50 border border-slate-200 px-3 py-2">
                                <p className="text-lg font-extrabold text-slate-900">{shopProducts.length}</p>
                                <p className="text-[11px] text-slate-500">Products</p>
                            </div>
                            <div className="rounded-xl bg-slate-50 border border-slate-200 px-3 py-2">
                                <p className="text-lg font-extrabold text-slate-900">{cart.reduce((sum, item) => sum + item.qty, 0)}</p>
                                <p className="text-[11px] text-slate-500">In Cart</p>
                            </div>
                            <div className="rounded-xl bg-slate-50 border border-slate-200 px-3 py-2">
                                <p className="text-lg font-extrabold text-slate-900">Tk {cartTotal.toFixed(0)}</p>
                                <p className="text-[11px] text-slate-500">Subtotal</p>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                        <input
                            value={shopSearch}
                            onChange={(e) => setShopSearch(e.target.value)}
                            placeholder="Search medicine or brand"
                            className="md:col-span-2 h-11 rounded-xl border border-slate-300 px-3 focus:outline-none focus:ring-2 focus:ring-teal-500"
                        />
                        <select
                            value={shopCategory}
                            onChange={(e) => setShopCategory(e.target.value)}
                            className="h-11 rounded-xl border border-slate-300 px-3 focus:outline-none focus:ring-2 focus:ring-teal-500"
                        >
                            {CATEGORY_TAGS.map((c) => <option key={c}>{c}</option>)}
                        </select>
                    </div>
                </div>

                {shopLoading ? (
                    <div className="glass rounded-2xl p-8 text-center">
                        <div className="w-12 h-12 border-4 border-teal-100 border-t-teal-700 rounded-full animate-spin mx-auto"></div>
                        <p className="mt-3 text-slate-600">Loading products...</p>
                    </div>
                ) : (
                    <>
                        {filteredProducts.length === 0 ? (
                            <div className="glass rounded-2xl p-10 text-center">
                                <i className="fa-regular fa-face-frown text-4xl text-slate-300"></i>
                                <p className="mt-3 font-semibold text-slate-700">No products found in Firestore</p>
                                <p className="text-sm text-slate-500 mt-1">Please confirm the products collection name and document fields.</p>
                                <div className="mt-4 inline-flex items-center gap-2 rounded-full bg-slate-100 px-3 py-1 text-xs text-slate-600">
                                    <i className="fa-solid fa-database text-teal-700"></i>
                                    Expected fields: brand_name, generic_name, drug_class, form, strength, company, price, packaging, offer, image_url
                                </div>
                            </div>
                        ) : (
                            <div className="grid sm:grid-cols-2 gap-4">
                                {filteredProducts.map((p) => (
                                    <article key={p.id} className="glass rounded-2xl p-4 overflow-hidden">
                                        <div className="h-40 rounded-xl bg-slate-100 mb-3 overflow-hidden relative">
                                            {getProductImage(p) ? (
                                                <img src={getProductImage(p)} alt={p.name} className="w-full h-full object-cover" />
                                            ) : (
                                                <div className="w-full h-full flex items-center justify-center bg-gradient-to-br from-cyan-100 to-teal-100 text-teal-700 text-4xl">
                                                    <i className="fa-solid fa-capsules"></i>
                                                </div>
                                            )}
                                            <div className="absolute left-3 top-3 rounded-full bg-white/90 px-2.5 py-1 text-[11px] font-bold text-teal-700 shadow-sm">
                                                {p.category}
                                            </div>
                                        </div>
                                        <h3 className="font-extrabold text-lg leading-tight">{p.brandName || p.name}</h3>
                                        {p.genericName && <p className="text-sm text-slate-600">Generic: {p.genericName}</p>}
                                        <p className="text-sm text-slate-500">{p.company || p.brand}</p>

                                        <div className="mt-3 grid grid-cols-2 gap-2 text-[11px] text-slate-600">
                                            {p.strength && <span className="px-2 py-1 rounded bg-slate-100 border border-slate-200">Strength: {p.strength}</span>}
                                            {p.form && <span className="px-2 py-1 rounded bg-slate-100 border border-slate-200">Form: {p.form}</span>}
                                            {p.drugClass && <span className="px-2 py-1 rounded bg-slate-100 border border-slate-200 col-span-2">Class: {p.drugClass}</span>}
                                        </div>

                                        {p.description && (
                                            <p className="mt-3 text-xs text-slate-600 line-clamp-3">{p.description}</p>
                                        )}

                                        {p.offer && (
                                            <div className="mt-3 text-xs font-semibold text-orange-700 bg-orange-50 border border-orange-100 px-2 py-1 rounded-md inline-flex items-center">
                                                <i className="fa-solid fa-tags mr-1"></i>{p.offer}
                                            </div>
                                        )}

                                        {p.packaging.length > 0 && (
                                            <p className="mt-2 text-xs text-slate-500">Packaging: {p.packaging.join(", ")}</p>
                                        )}

                                        <div className="mt-4 flex items-center justify-between">
                                            <p className="text-2xl font-extrabold text-slate-900">Tk {p.price.toFixed(2)}</p>
                                            <button onClick={() => addToCart(p)} className="h-10 px-4 rounded-lg bg-teal-700 text-white text-sm font-semibold">
                                                <i className="fa-solid fa-cart-plus mr-1"></i>Add
                                            </button>
                                        </div>

                                        <button className="mt-3 w-full h-10 rounded-lg border border-slate-200 bg-white text-sm font-semibold text-slate-700">
                                            View details
                                        </button>
                                    </article>
                                ))}
                            </div>
                        )}
                    </>
                )}
            </div>

            <div className="xl:col-span-4">
                <div className="glass rounded-2xl p-5 sticky top-24">
                    <h3 className="text-xl font-extrabold mb-4 flex items-center">
                        <i className="fa-solid fa-bag-shopping text-teal-700 mr-2"></i>Your Cart
                    </h3>

                    {cart.length === 0 ? (
                        <p className="text-sm text-slate-500">No items in cart yet.</p>
                    ) : (
                        <div className="space-y-3">
                            {cart.map((item) => (
                                <div key={item.id} className="bg-white border border-slate-200 rounded-xl p-3">
                                    <p className="font-bold text-slate-800 text-sm">{item.name}</p>
                                    <p className="text-xs text-slate-500 mb-2">{item.brand}</p>
                                    <div className="flex items-center justify-between">
                                        <p className="font-extrabold text-slate-900">Tk {(item.price * item.qty).toFixed(2)}</p>
                                        <div className="flex items-center gap-2">
                                            <button onClick={() => changeQty(item.id, -1)} className="w-7 h-7 rounded bg-slate-200">-</button>
                                            <span className="text-sm font-bold w-5 text-center">{item.qty}</span>
                                            <button onClick={() => changeQty(item.id, 1)} className="w-7 h-7 rounded bg-slate-200">+</button>
                                        </div>
                                    </div>
                                </div>
                            ))}

                            <div className="pt-3 border-t border-slate-200">
                                <div className="flex justify-between text-sm text-slate-600 mb-1">
                                    <span>Subtotal</span><span>Tk {cartTotal.toFixed(2)}</span>
                                </div>
                                <div className="flex justify-between text-sm text-slate-600 mb-3">
                                    <span>Delivery</span><span>Tk Free</span>
                                </div>
                                <div className="rounded-xl bg-teal-50 border border-teal-100 p-3 mb-3 text-xs text-teal-800">
                                    You can later replace this with checkout form, address, and phone collection.
                                </div>
                                <div className="flex justify-between font-extrabold text-lg">
                                    <span>Total</span><span>Tk {cartTotal.toFixed(2)}</span>
                                </div>
                                <button
                                    onClick={() => alert("Order placed successfully. Pharmacy partner will contact you soon.")}
                                    className="w-full mt-4 h-11 rounded-xl bg-teal-700 text-white font-semibold"
                                >
                                    <i className="fa-solid fa-credit-card mr-2"></i>Checkout
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            </div>
        </section>
    );

    const RoutineView = () => (
        <section className="fade-up space-y-4">
            <div className="glass rounded-3xl p-6 md:p-8">
                <h2 className="text-2xl md:text-3xl font-extrabold mb-2">My Daily Pill Routine</h2>
                <p className="text-slate-600">Track your medicine intake and adherence progress.</p>
                <div className="mt-5">
                    <div className="flex justify-between text-sm mb-1">
                        <span className="text-slate-600">Today completion</span>
                        <span className="font-bold text-teal-700">{progress}%</span>
                    </div>
                    <div className="h-2.5 bg-slate-200 rounded-full overflow-hidden">
                        <div className="h-full bg-teal-600" style={{ width: `${progress}%` }}></div>
                    </div>
                </div>
            </div>

            {profile.reminders.map((rem) => (
                <div key={rem.id} className="glass rounded-xl p-4 flex items-center justify-between">
                    <div className="flex items-center">
                        <div className={`w-10 h-10 rounded-full flex items-center justify-center mr-3 ${rem.status === "Taken" ? "bg-emerald-500 text-white" : "bg-slate-100 text-slate-500"}`}>
                            <i className={`fa-solid ${rem.status === "Taken" ? "fa-check" : "fa-pills"}`}></i>
                        </div>
                        <div>
                            <p className={`font-semibold ${rem.status === "Taken" ? "line-through text-slate-400" : "text-slate-800"}`}>{rem.medicine}</p>
                            <p className="text-xs text-teal-700">{rem.time}</p>
                        </div>
                    </div>

                    {rem.status === "Taken" ? (
                        <span className="text-xs px-3 py-1 rounded-full bg-emerald-100 text-emerald-700 font-semibold">Completed</span>
                    ) : (
                        <button onClick={() => markTaken(rem.id)} className="px-4 py-2 rounded-lg bg-teal-700 text-white text-sm font-semibold">
                            Mark as Taken
                        </button>
                    )}
                </div>
            ))}
        </section>
    );

    const renderMain = () => {
        if (view === "finder") return <FinderView />;
        if (view === "shop") return <ShopView />;
        if (view === "routine") return <RoutineView />;

        if (view === "symptom") {
            return (
                <ToolCard title="Symptom Analyzer" icon="fa-stethoscope">
                    <form onSubmit={submitSymptom} className="space-y-3">
                        <textarea value={symptomForm.symptoms} onChange={(e) => setSymptomForm({ ...symptomForm, symptoms: e.target.value })} placeholder="Describe symptoms" className="w-full rounded-xl border border-slate-300 p-3" rows="4" required />
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <input value={symptomForm.age} onChange={(e) => setSymptomForm({ ...symptomForm, age: e.target.value })} type="number" placeholder="Age" className="rounded-xl border border-slate-300 p-3" />
                            <input value={symptomForm.duration} onChange={(e) => setSymptomForm({ ...symptomForm, duration: e.target.value })} placeholder="Duration (e.g., 2 days)" className="rounded-xl border border-slate-300 p-3" />
                        </div>
                        <button className="h-11 px-6 rounded-xl bg-teal-700 text-white font-semibold" type="submit">{moduleLoading === "symptom" ? "Analyzing..." : "Analyze Symptoms"}</button>
                    </form>
                    <JsonView title="Analysis" data={symptomResult} />
                </ToolCard>
            );
        }

        if (view === "interaction") {
            return (
                <ToolCard title="Drug Interaction Checker" icon="fa-shield-virus">
                    <form onSubmit={submitInteraction} className="space-y-3">
                        <textarea value={interactionInput} onChange={(e) => setInteractionInput(e.target.value)} placeholder="Medicines separated by comma" className="w-full rounded-xl border border-slate-300 p-3" rows="4" required />
                        <button className="h-11 px-6 rounded-xl bg-teal-700 text-white font-semibold" type="submit">{moduleLoading === "interaction" ? "Checking..." : "Check Interactions"}</button>
                    </form>
                    <JsonView title="Interaction Report" data={interactionResult} />
                </ToolCard>
            );
        }

        if (view === "dosage") {
            return (
                <ToolCard title="Dosage Calculator" icon="fa-calculator">
                    <form onSubmit={submitDosage} className="space-y-3">
                        <input value={dosageForm.medicine_name} onChange={(e) => setDosageForm({ ...dosageForm, medicine_name: e.target.value })} placeholder="Medicine name" className="w-full rounded-xl border border-slate-300 p-3" required />
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                            <input value={dosageForm.age} onChange={(e) => setDosageForm({ ...dosageForm, age: e.target.value })} type="number" placeholder="Age" className="rounded-xl border border-slate-300 p-3" required />
                            <input value={dosageForm.weight} onChange={(e) => setDosageForm({ ...dosageForm, weight: e.target.value })} type="number" step="0.1" placeholder="Weight (kg)" className="rounded-xl border border-slate-300 p-3" required />
                            <input value={dosageForm.condition} onChange={(e) => setDosageForm({ ...dosageForm, condition: e.target.value })} placeholder="Condition" className="rounded-xl border border-slate-300 p-3" />
                        </div>
                        <button className="h-11 px-6 rounded-xl bg-teal-700 text-white font-semibold" type="submit">{moduleLoading === "dosage" ? "Calculating..." : "Calculate Dosage"}</button>
                    </form>
                    <JsonView title="Dosage Recommendation" data={dosageResult} />
                </ToolCard>
            );
        }

        if (view === "effects") {
            return (
                <ToolCard title="Side Effects Predictor" icon="fa-triangle-exclamation">
                    <form onSubmit={submitEffects} className="space-y-3">
                        <input value={effectsForm.medicine_name} onChange={(e) => setEffectsForm({ ...effectsForm, medicine_name: e.target.value })} placeholder="Medicine name" className="w-full rounded-xl border border-slate-300 p-3" required />
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <input value={effectsForm.patient_age} onChange={(e) => setEffectsForm({ ...effectsForm, patient_age: e.target.value })} type="number" placeholder="Patient age" className="rounded-xl border border-slate-300 p-3" />
                            <input value={effectsForm.existing_conditions} onChange={(e) => setEffectsForm({ ...effectsForm, existing_conditions: e.target.value })} placeholder="Existing conditions" className="rounded-xl border border-slate-300 p-3" />
                        </div>
                        <button className="h-11 px-6 rounded-xl bg-teal-700 text-white font-semibold" type="submit">{moduleLoading === "effects" ? "Predicting..." : "Predict Side Effects"}</button>
                    </form>
                    <JsonView title="Side Effect Risk" data={effectsResult} />
                </ToolCard>
            );
        }

        return (
            <ToolCard title="Drug Encyclopedia" icon="fa-book-medical">
                <form onSubmit={submitEncyclopedia} className="space-y-3">
                    <input value={encyclopediaDrug} onChange={(e) => setEncyclopediaDrug(e.target.value)} placeholder="Search medicine info" className="w-full rounded-xl border border-slate-300 p-3" required />
                    <button className="h-11 px-6 rounded-xl bg-teal-700 text-white font-semibold" type="submit">{moduleLoading === "encyclopedia" ? "Loading..." : "Get Drug Info"}</button>
                </form>
                <JsonView title="Drug Profile" data={encyclopediaResult} />
            </ToolCard>
        );
    };

    const TipsPanel = () => (
        <aside className="glass rounded-2xl p-5 sticky top-24">
            <h3 className="text-lg font-bold mb-3 flex items-center">
                <i className="fa-solid fa-lightbulb text-amber-500 mr-2"></i>
                Health Tips
            </h3>
            <ul className="space-y-3 text-sm text-slate-700">
                <li className="flex"><i className="fa-solid fa-check text-teal-600 mt-1 mr-2"></i>Check interactions before combining multiple medicines.</li>
                <li className="flex"><i className="fa-solid fa-check text-teal-600 mt-1 mr-2"></i>For severe symptoms, emergency care should be first priority.</li>
                <li className="flex"><i className="fa-solid fa-check text-teal-600 mt-1 mr-2"></i>Set reminders to improve medicine adherence.</li>
            </ul>
        </aside>
    );

    return (
        <div className="min-h-screen flex">
            <aside className="hidden md:flex w-72 flex-col border-r border-slate-200 bg-white/90 backdrop-blur px-5 py-6 sticky top-0 h-screen">
                <button className="flex items-center mb-8" onClick={() => setView("finder")}>
                    <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-teal-600 to-cyan-500 text-white flex items-center justify-center mr-3 shadow-lg shadow-teal-200">
                        <i className="fa-solid fa-pills text-lg"></i>
                    </div>
                    <div className="text-left">
                        <p className="font-extrabold text-lg leading-none tracking-tight">PharmaIQ</p>
                        <p className="text-xs text-slate-500">Medicine. Advice. Shopping.</p>
                    </div>
                </button>

                <nav className="space-y-2 overflow-auto pr-1">
                    {NAV_ITEMS.map((item) => (
                        <button
                            key={item.id}
                            onClick={() => setView(item.id)}
                            className={`w-full h-11 rounded-lg text-left px-3 text-sm font-semibold transition ${view === item.id ? "bg-teal-700 text-white" : "bg-slate-100 text-slate-700 hover:bg-slate-200"}`}
                        >
                            <i className={`fa-solid ${item.icon} mr-2`}></i>{item.label}
                        </button>
                    ))}
                </nav>

                <div className="mt-auto rounded-xl bg-amber-50 border border-amber-100 p-3 text-xs text-amber-800">
                    For informational support only. Consult licensed doctors for final decisions.
                </div>
            </aside>

            <div className="flex-1 min-w-0">
                <header className="md:hidden sticky top-0 z-30 bg-white/90 backdrop-blur border-b border-slate-200 px-4 py-3 flex items-center justify-between">
                    <div className="flex items-center">
                        <div className="w-10 h-10 rounded-2xl bg-gradient-to-br from-teal-600 to-cyan-500 text-white flex items-center justify-center mr-2 shadow-lg shadow-teal-100">
                            <i className="fa-solid fa-pills"></i>
                        </div>
                        <div>
                            <p className="font-extrabold leading-none">PharmaIQ</p>
                            <p className="text-[11px] text-slate-500">Medicine Platform</p>
                        </div>
                    </div>
                    <button onClick={() => setMobileMenu(true)} className="w-10 h-10 rounded-lg bg-slate-100 text-slate-700">
                        <i className="fa-solid fa-bars"></i>
                    </button>
                </header>

                <main className="max-w-7xl mx-auto px-4 md:px-6 py-6 grid grid-cols-1 xl:grid-cols-12 gap-6">
                    <div className="xl:col-span-8 space-y-4">
                        {moduleError && <div className="glass rounded-xl p-3 text-sm text-rose-700 bg-rose-50 border-rose-200">{moduleError}</div>}
                        {renderMain()}
                    </div>
                    <div className="xl:col-span-4 hidden xl:block">
                        <TipsPanel />
                    </div>
                </main>
            </div>

            {mobileMenu && (
                <div className="fixed inset-0 bg-black/40 z-50 md:hidden" onClick={() => setMobileMenu(false)}>
                    <div className="w-80 max-w-[90vw] h-full bg-white p-4" onClick={(e) => e.stopPropagation()}>
                        <div className="flex items-center mb-4">
                            <div className="w-10 h-10 rounded-2xl bg-gradient-to-br from-teal-600 to-cyan-500 text-white flex items-center justify-center mr-3">
                                <i className="fa-solid fa-pills"></i>
                            </div>
                            <div>
                                <p className="font-extrabold leading-none">PharmaIQ</p>
                                <p className="text-[11px] text-slate-500">Medicine Platform</p>
                            </div>
                        </div>
                        <div className="space-y-2 overflow-auto">
                            {NAV_ITEMS.map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => { setView(item.id); setMobileMenu(false); }}
                                    className={`w-full h-11 rounded-lg text-left px-3 text-sm font-semibold ${view === item.id ? "bg-teal-700 text-white" : "bg-slate-100 text-slate-700"}`}
                                >
                                    <i className={`fa-solid ${item.icon} mr-2`}></i>{item.label}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            )}

            {isScanning && (
                <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center px-4">
                    <div className="relative w-72 h-96 rounded-xl border border-teal-400 overflow-hidden mb-5">
                        <img src="https://images.unsplash.com/photo-1586281380349-632531db7ed4?auto=format&fit=crop&w=500&q=80" alt="Prescription" className="w-full h-full object-cover opacity-55" />
                        <div className="scan-line"></div>
                    </div>
                    <h3 className="text-white text-xl font-bold">AI OCR is scanning prescription...</h3>
                </div>
            )}

            <div className="fixed right-5 bottom-5 z-40">
                <button onClick={() => setChatOpen((v) => !v)} className="w-14 h-14 rounded-full bg-teal-700 text-white shadow-xl hover:bg-teal-800">
                    <i className={`fa-solid ${chatOpen ? "fa-xmark" : "fa-comment-medical"} text-xl`}></i>
                </button>
            </div>

            <aside className={`chat-drawer fixed top-0 right-0 h-full w-full sm:w-[390px] bg-white border-l border-slate-200 shadow-2xl z-50 ${chatOpen ? "translate-x-0 opacity-100" : "translate-x-full opacity-0 pointer-events-none"}`}>
                <div className="h-full flex flex-col">
                    <div className="px-4 py-4 border-b border-slate-200 flex items-center justify-between">
                        <div>
                            <h4 className="font-bold text-slate-900">PharmaBot</h4>
                            <p className="text-xs text-slate-500">Ask medicine related questions</p>
                        </div>
                        <button onClick={() => setChatOpen(false)} className="w-9 h-9 rounded-full bg-slate-100"><i className="fa-solid fa-xmark"></i></button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
                        {chatMessages.map((m, i) => (
                            <div key={i} className={`flex ${m.sender === "user" ? "justify-end" : "justify-start"}`}>
                                <div className={`max-w-[82%] px-3 py-2 rounded-2xl text-sm ${m.sender === "user" ? "bg-teal-700 text-white rounded-br-md" : "bg-white border border-slate-200 text-slate-800 rounded-bl-md"}`}>
                                    {m.text}
                                </div>
                            </div>
                        ))}
                    </div>

                    <form onSubmit={sendChat} className="p-3 border-t border-slate-200 flex gap-2">
                        <input value={chatInput} onChange={(e) => setChatInput(e.target.value)} placeholder="Type your question..." className="flex-1 h-11 rounded-xl border border-slate-300 px-3 focus:outline-none focus:ring-2 focus:ring-teal-500" />
                        <button className="w-11 h-11 rounded-xl bg-teal-700 text-white" type="submit"><i className="fa-solid fa-paper-plane"></i></button>
                    </form>
                </div>
            </aside>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
